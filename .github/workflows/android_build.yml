name: Android Release Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: android-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android CMake
        run: |
          set -e
          SDKMANAGER="${ANDROID_HOME:-$ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="${ANDROID_SDK_ROOT:-$ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          fi
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(command -v sdkmanager || true)"
          fi
          if [ -z "$SDKMANAGER" ] || [ ! -x "$SDKMANAGER" ]; then
            echo "sdkmanager not found"
            echo "ANDROID_HOME=${ANDROID_HOME:-}"
            echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-}"
            exit 127
          fi

          for attempt in 1 2 3; do
            echo "Installing CMake 3.22.1 (attempt $attempt)"
            if yes | "$SDKMANAGER" "cmake;3.22.1"; then
              exit 0
            fi
            rm -rf "$ANDROID_HOME/cmake/3.22.1" "$ANDROID_SDK_ROOT/cmake/3.22.1"
            sleep 5
          done
          yes | "$SDKMANAGER" "cmake;3.22.1"

      - name: Decode google-services.json from secret
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          mkdir -p android/app
          echo "$GOOGLE_SERVICES_JSON" | base64 --decode > android/app/google-services.json

      - name: Install dependencies
        run: flutter pub get

      - name: Decode and setup signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.jks
          cat > android/key.properties << EOF
          storeFile=app/release.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEYSTORE_KEY_ALIAS
          keyPassword=$KEYSTORE_KEY_PASSWORD
          EOF

      - name: Build signed release APK (ARM64 only)
        run: flutter build apk --release --target-platform=android-arm64

      - name: Upload app-release.apk artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Write Firebase service account file
        if: github.ref == 'refs/heads/main'
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > firebase-service-account.json

      - name: Install Firebase CLI
        if: github.ref == 'refs/heads/main'
        run: npm install -g firebase-tools

      - name: Distribute APK to Firebase App Distribution
        if: github.ref == 'refs/heads/main'
        env:
          GOOGLE_APPLICATION_CREDENTIALS: firebase-service-account.json
          FIREBASE_ANDROID_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          FIREBASE_TESTERS: ${{ secrets.FIREBASE_TESTERS }}
        run: |
          firebase appdistribution:distribute build/app/outputs/flutter-apk/app-release.apk \
            --app "$FIREBASE_ANDROID_APP_ID" \
            --testers "$FIREBASE_TESTERS" \
            --release-notes "Preview APK from commit ${{ github.sha }} | Run #${{ github.run_number }}"

      - name: Publish preview APK release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: preview-0.0.${{ github.run_number }}
          APK_NAME: startups-india-preview-0.0.${{ github.run_number }}.apk
        run: |
          set -e
          cp build/app/outputs/flutter-apk/app-release.apk "$APK_NAME"

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$APK_NAME" --clobber
          else
            gh release create "$TAG_NAME" "$APK_NAME" \
              --title "Preview 0.0.${{ github.run_number }}" \
              --notes "Preview APK from commit ${{ github.sha }}" \
              --prerelease
          fi
